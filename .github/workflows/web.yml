# Builds the web player (Expo static export) and publishes it as a tiny image,
# ghcr.io/<owner>/audiosilo-web, that the audiosilo-server image bakes in at
# /app/web. The static files are built with baseUrl=/web (app.json
# experiments.baseUrl) so their asset URLs resolve under that subpath.
#
# Requires repo secret FONTAWESOME_NPM_AUTH_TOKEN (the @fortawesome registry, see
# .npmrc). Pushes :latest for the default branch and the semver tag for v* tags.
name: web image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

      - name: Export web build
        run: npx expo export --platform web --output-dir dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/audiosilo-web
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
